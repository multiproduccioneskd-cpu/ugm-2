<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b192f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #002060;
            padding: 20px 0px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #0056b3;
            width: 100%;
            position: relative;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-left: 20px;
        }
        .logo-u {
            height: 65px;
            width: auto;
        }
        .logo-centro-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-centro {
            height: 65px;
            width: auto;
        }
        header h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        #right-header {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
            padding-right: 20px; 
        }
        #current-date {
            font-size: 1.6rem;
            color: #ffc000;
            font-weight: bold;
            text-transform: capitalize;
        }
        #current-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
        }
        main {
            flex: 1;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        #scroll-wrapper {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transition: transform 0.25s linear, opacity 0.6s ease-in-out;
        }
        .container.fade-in {
            opacity: 1;
        }
        .event-card {
            background-color: #172a45;
            border-left: 12px solid #0056b3;
            border-radius: 12px;
            padding: 30px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .event-title {
            font-size: 2.6rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
        }
        .event-room {
            font-size: 1.8rem;
            color: #000000;
            font-weight: bold;
            background-color: #ffa500;
            padding: 8px 24px;
            border-radius: 8px;
            align-self: flex-start;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .event-time {
            font-size: 3.2rem;
            font-weight: 800;
            color: #38b6ff;
            background-color: #0b192f;
            padding: 15px 35px;
            border-radius: 10px;
            border: 3px solid #0056b3;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 200px;
        }
        .event-day-label {
            font-size: 1.2rem;
            color: #8892b0;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .no-events {
            font-size: 2.8rem;
            text-align: center;
            color: #8892b0;
            margin-top: 15vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://www.ugm.cl/images/logo.png" alt="UGM" class="logo-u">
            <h1 id="main-title">EVENTOS DE HOY</h1>
        </div>
        
        <div class="logo-centro-wrapper">
            <img id="logo-medio" src="logo-blanco-celeste.png" alt="Logo Central" class="logo-centro">
        </div>

        <div id="right-header">
            <div id="current-date">Cargando fecha...</div>
            <div id="current-time">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="scroll-wrapper">
            <div id="events-container" class="container">
                <div class="no-events">Buscando programaciones en SharePoint...</div>
            </div>
        </div>
    </main>

    <script>
        let scrollInterval = null;
        let rotationTimeout = null;
        let modoVistaSemanas = false; 

        function updateClock() {
            const ahora = new Date();
            document.getElementById('current-time').innerText = ahora.toLocaleTimeString('es-CL', { hour12: false });
            
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Santiago' };
            let fechaTexto = ahora.toLocaleDateString('es-CL', opciones);
            document.getElementById('current-date').innerText = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function iniciarManejoPantalla(cantidadEventos) {
            if (scrollInterval) clearInterval(scrollInterval);
            if (rotationTimeout) clearTimeout(rotationTimeout);
            
            const wrapper = document.getElementById('scroll-wrapper');
            const container = document.getElementById('events-container');
            
            container.style.transform = `translateY(0px)`;
            const wrapperHeight = wrapper.clientHeight;
            const containerHeight = container.clientHeight;

            // CONDICIÓN: Si son 3 o menos eventos Y cabe físico en la pantalla, se quedan FIJOS
            if (cantidadEventos <= 3 && containerHeight <= wrapperHeight) {
                // Se quedan estáticos leyendo en la tele y rotan tras 10 segundos exactos
                rotationTimeout = setTimeout(() => {
                    container.classList.remove('fade-in');
                    setTimeout(cargarCartelera, 600);
                }, 10000);
            } else {
                // Si sobrepasa el espacio, se activa el scroll dinámico controlado
                let currentTop = 0;
                scrollInterval = setInterval(() => {
                    if (container.clientHeight > wrapper.clientHeight) {
                        currentTop -= 1; // Desplazamiento fluido
                        
                        // Si llegó al final del listado largo
                        if (Math.abs(currentTop) >= (container.clientHeight - wrapper.clientHeight + 40)) {
                            clearInterval(scrollInterval);
                            
                            // Espera 2.5 segundos abajo para que terminen de leer el último ítem
                            rotationTimeout = setTimeout(() => {
                                container.classList.remove('fade-in');
                                // Aplica Fade Out y salta de inmediato a la otra ventana
                                setTimeout(cargarCartelera, 600);
                            }, 2500);
                        } else {
                            container.style.transform = `translateY(${currentTop}px)`;
                        }
                    }
                }, 35); // Velocidad de scroll optimizada (un pelo más ágil)
            }
        }

        async function cargarCartelera() {
            const container = document.getElementById('events-container');
            const tituloSeccion = document.getElementById('main-title');
            
            container.classList.remove('fade-in');
            
            setTimeout(async () => {
                try {
                    const response = await fetch(`https://ugm-2.vercel.app/api/cartelera?nocache=${Date.now()}`);
                    if (!response.ok) throw new Error('Error API');
                    
                    const eventosRaw = await response.json();
                    container.innerHTML = '';
                    
                    if (!eventosRaw || eventosRaw.length === 0 || eventosRaw.error) {
                        container.innerHTML = '<div class="no-events">No hay eventos registrados en SharePoint</div>';
                        container.classList.add('fade-in');
                        // Si está vacío, reintenta en 10 segundos
                        rotationTimeout = setTimeout(cargarCartelera, 10000);
                        return;
                    }

                    const hoyChileString = new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Santiago' }); 
                    const horaChileString = new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'America/Santiago' });

                    const listaProcesada = eventosRaw.map(ev => {
                        let fechaTexto = "9999-12-31";
                        let horaTexto = "00:00";
                        let esHoy = false;

                        if (ev.casillaTiempo && typeof ev.casillaTiempo === 'string') {
                            const dateObjeto = new Date(ev.casillaTiempo);
                            
                            if (!isNaN(dateObjeto.getTime())) {
                                const esTodoElDia = ev.casillaTiempo.includes("T00:00:00") || ev.casillaTiempo.includes("T02:00:00");

                                if (esTodoElDia) {
                                    fechaTexto = ev.casillaTiempo.split('T')[0];
                                    horaTexto = "Todo el día";
                                } else {
                                    const opcionesFecha = { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'America/Santiago' };
                                    const opcionesHora = { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'America/Santiago' };
                                    
                                    fechaTexto = dateObjeto.toLocaleDateString('sv-SE', opcionesFecha);
                                    horaTexto = dateObjeto.toLocaleTimeString('es-CL', opcionesHora);
                                }
                                esHoy = (fechaTexto === hoyChileString);
                            }
                        }

                        return {
                            title: ev.title || "Evento sin título",
                            sala: ev.sala || "Por definir",
                            hora: horaTexto,
                            fechaStr: fechaTexto,
                            esHoy: esHoy
                        };
                    });

                    let muestraFinal = [];

                    if (modoVistaSemanas) {
                        tituloSeccion.innerText = "PRÓXIMOS EVENTOS";
                        muestraFinal = listaProcesada.filter(ev => !ev.esHoy && ev.fechaStr > hoyChileString);
                    } else {
                        tituloSeccion.innerText = "EVENTOS DE HOY";
                        muestraFinal = listaProcesada.filter(ev => ev.esHoy && (ev.hora === "Todo el día" || ev.hora >= horaChileString));
                    }

                    if (muestraFinal.length === 0 && !modoVistaSemanas) {
                        tituloSeccion.innerText = "PRÓXIMOS EVENTOS";
                        muestraFinal = listaProcesada.filter(ev => !ev.esHoy && ev.fechaStr > hoyChileString);
                    }

                    if (muestraFinal.length === 0) {
                        container.innerHTML = '<div class="no-events">No hay más eventos programados</div>';
                        container.classList.add('fade-in');
                        modoVistaSemanas = !modoVistaSemanas;
                        rotationTimeout = setTimeout(cargarCartelera, 8000);
                        return;
                    }

                    muestraFinal.sort((a, b) => `${a.fechaStr}T${a.hora}`.localeCompare(`${b.fechaStr}T${b.hora}`));

                    container.innerHTML = '';
                    
                    muestraFinal.forEach(ev => {
                        let etiquetaDia = "Hoy";
                        
                        if (!ev.esHoy && ev.fechaStr !== "9999-12-31") {
                            try {
                                const [aaaa, mes, dd] = ev.fechaStr.split('-');
                                const d = new Date(parseInt(aaaa,10), parseInt(mes,10) - 1, parseInt(dd,10), 12, 0, 0);
                                const nombreDia = d.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
                                const numDia = d.getDate();
                                etiquetaDia = `${nombreDia.charAt(0).toUpperCase() + nombreDia.slice(1)} ${numDia}`;
                            } catch (e) {
                                etiquetaDia = "Próximo";
                            }
                        }

                        const card = document.createElement('div');
                        card.className = 'event-card';
                        card.innerHTML = `
                            <div class="event-info">
                                <div class="event-title">${ev.title}</div>
                                <div class="event-room">${ev.sala}</div>
                            </div>
                            <div class="event-time">
                                <div class="event-day-label">${etiquetaDia}</div>
                                <div>${ev.hora}</div>
                            </div>
                        `;
                        container.appendChild(card);
                    });

                    // Cambiamos el modo para el tiro que viene
                    modoVistaSemanas = !modoVistaSemanas;
                    
                    // Activamos la aparición visual suave
                    container.classList.add('fade-in');
                    
                    // Ejecutamos el validador inteligente de movimiento/fijeza
                    setTimeout(() => {
                        iniciarManejoPantalla(muestraFinal.length);
                    }, 400);

                } catch (error) {
                    console.error(error);
                    container.innerHTML = '<div class="no-events">⚠️ Error de conexión</div>';
                    container.classList.add('fade-in');
                    rotationTimeout = setTimeout(cargarCartelera, 10000);
                }
            }, 600);
        }

        window.onload = () => {
            cargarCartelera();
        };
    </script>
</body>
</html>
