<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos - Universidad Gabriela Mistral</title>
    <style>
        :root {
            --ugm-blue: #002f6c;
            --ugm-yellow: #ffc72c;
            --text-dark: #333333;
            --bg-light: #f4f6f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--ugm-blue);
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--ugm-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .clock-container {
            font-size: 2.2rem;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            padding: 5px 20px;
            border-radius: 8px;
            border-left: 4px solid var(--ugm-yellow);
        }

        main {
            flex: 1;
            overflow: hidden;
            position: relative;
            padding: 20px 40px 100px 40px; /* Espacio abajo para el footer fijo */
        }

        #scroll-container {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }

        #events-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            position: absolute;
            width: 100%;
            top: 0;
            transition: transform 0.5s ease-in-out;
        }

        .event-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.06);
            border-left: 8px solid var(--ugm-blue);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 180px;
        }

        .event-card.highlight {
            border-left-color: var(--ugm-yellow);
            background: linear-gradient(to right, #fffdf3, #ffffff);
        }

        .event-title {
            font-size: 1.8rem;
            color: var(--ugm-blue);
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .event-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            font-size: 1.3rem;
            color: #555;
        }
