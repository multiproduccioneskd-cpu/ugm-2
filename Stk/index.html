<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Control Aéreo - Flota Tomy</title>
    <style>
        :root {
            --bg-color: #080b11;
            --panel-color: #121824;
            --text-main: #ffffff;
            --airport-yellow: #ffcc00;
            --airport-green: #00ff66;
            --airport-cyan: #00cccc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            border-bottom: 3px double var(--airport-yellow);
            padding-bottom: 10px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        header h1 {
            color: var(--airport-yellow);
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .legend {
            color: #aaa;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .clock {
            color: #00ffcc;
            font-size: 1.3rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .table-container {
            width: 100%;
            max-width: 1200px;
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 20px;
            scrollbar-width: none;
        }

        .table-container::-webkit-scrollbar {
            display: none;
        }

        .airport-board {
            width: 100%;
            border-collapse: collapse;
            background-color: #000;
            box-shadow: 0 0 25px rgba(0,0,0,0.8);
        }

        .airport-board th {
            background-color: var(--panel-color);
            color: #778899;
            text-align: left;
            padding: 12px 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .airport-board tr {
            border-bottom: 1px solid #1a1a1a;
            transition: all 0.5s ease-out;
        }

        .airport-board td {
            padding: 16px 15px;
            font-size: 1.05rem;
            font-weight: bold;
            letter-spacing: 1px;
            vertical-align: middle;
        }

        .col-time { color: var(--airport-yellow); font-weight: bold; }
        .col-ac { color: #00bfff; } 
        .col-route { color: var(--airport-cyan); font-weight: bold; }
        .col-mission { color: #ffffff; text-transform: uppercase; }
        .col-status { text-align: center; }

        .liv-boeing { color: #3385ff; }
        .liv-airbus { color: #00ffcc; }
        .liv-latam { color: #ff3344; }
        .liv-dhl { color: #ffcc00; background-color: #d40000; padding: 2px 6px; border-radius: 3px; }
        .liv-ups { color: #ffbc42; }
        .liv-fedex { color: #ff6600; }
        .liv-maersk { color: #70d6ff; }
        .liv-usaf { color: #95a5a6; }
        .liv-fire { color: #ff4500; }

        .status-boarding { color: #000; background-color: var(--airport-green); padding: 4px 8px; border-radius: 3px; font-size: 0.85rem; }
        .status-standby { color: #fff; background-color: #444; padding: 4px 8px; border-radius: 3px; font-size: 0.85rem; }
        .status-alert { color: #fff; background-color: #ff0000; padding: 4px 8px; border-radius: 3px; font-size: 0.85rem; animation: blink 1s infinite; }
        .status-departed { color: #000; background-color: var(--airport-yellow); padding: 4px 8px; border-radius: 3px; font-size: 0.85rem; }

        /* Animación para filas nuevas */
        .row-new {
            animation: fadeInRow 1s ease-in-out;
        }

        @keyframes fadeInRow {
            0% { background-color: #1a3322; opacity: 0; }
            100% { background-color: transparent; opacity: 1; }
        }

        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1>HANGAR CONTROL TERMINAL</h1>
        <div class="subtitle">SISTEMA DE ITINERARIO DINÁMICO EN TIEMPO REAL</div>
        <div class="legend">INDICADORES OACI: [SLIV] AEROPUERTO LIVING | [SKIB] AEROPUERTO PIEZA</div>
        <div class="clock" id="live-clock">ZULU TIME: --:--:--</div>
    </header>

    <div class="table-container" id="scroll-container">
        <table class="airport-board">
            <thead>
                <tr>
                    <th style="width: 12%" class="col-time">DEP TIME</th>
                    <th style="width: 10%">AVIÓN</th>
                    <th style="width: 20%">LIVERY / COMPAÑÍA</th>
                    <th style="width: 15%">RUTA</th>
                    <th style="width: 30%">CONTENIDO / MISIÓN DE ESTRENO</th>
                    <th style="width: 13%; text-align: center;">ESTADO</th>
                </tr>
            </thead>
            <tbody id="board-body">
                </tbody>
        </table>
    </div>

    <script>
        // Flota inicial del Tomy con sus aeropuertos base iniciales
        let flota = [
            { ac: "B38M", livery: "Boeing Livery", class: "liv-boeing", mission: "Película de la Tarde: (Escribir aquí)", orig: "SKIB", dest: "SLIV" },
            { ac: "A20N", livery: "Airbus House", class: "liv-airbus", mission: "Maratón de Dibujos Animados", orig: "SLIV", dest: "SKIB" },
            { ac: "B763", livery: "LATAM Airlines", class: "liv-latam", mission: "Estreno Especial de Fin de Semana", orig: "SKIB", dest: "SLIV" },
            { ac: "B757F", livery: "DHL Cargo", class: "liv-dhl", mission: "Carga de Capítulos Nuevos: (Escribir Serie)", isDHL: true, orig: "SLIV", dest: "SKIB" },
            { ac: "B744F", livery: "UPS Airlines", class: "liv-ups", mission: "Carga Pesada: Película de Acción", orig: "SKIB", dest: "SLIV" },
            { ac: "A388F", livery: "FedEx Express", class: "liv-fedex", mission: "Envío Urgente: Bloque de Series", orig: "SLIV", dest: "SKIB" },
            { ac: "A350F", livery: "Maersk Air Cargo", class: "liv-maersk", mission: "Logística de Estreno: Documental Espacial", orig: "SKIB", dest: "SLIV" },
            { ac: "CL415", livery: "FIRE CONTROL", class: "liv-fire", mission: "¡Misión de Emergencia Extrema!", isFire: true, orig: "SLIV", dest: "SKIB" },
            { ac: "F22", livery: "USAF Air Force", class: "liv-usaf", mission: "Misión Secreta: Película de Suspenso", isMil: true, orig: "SKIB", dest: "SLIV" },
            { ac: "B52H", livery: "USAF Bomber", class: "liv-usaf", mission: "Bombardeo de Estrenos de Ciencia Ficción", isMilBomber: true, orig: "SLIV", dest: "SKIB" }
        ];

        const estadosNormales = ["EN VUELO", "EN PANTALLA", "PROGRAMADO", "EN RAMPA", "EN ESPERA"];

        function formatHHMM(date) {
            return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        // Inicializar flota con un intervalo exacto de 5 minutos entre cada avión
        function inicializarFlota() {
            const ahora = new Date();
            flota.forEach((avion, index) => {
                const tiempoVuelo = new Date(ahora.getTime());
                // El primer avión sale ahora, el segundo en 5 min, el tercero en 10 min, etc.
                tiempoVuelo.setMinutes(ahora.getMinutes() + (index * 5)); 
                
                avion.targetTime = tiempoVuelo;
                avion.statusText = obtenerEstadoInicial(avion, tiempoVuelo, ahora);
                avion.enProcesoDespegue = false;
            });
            ordenarCartelera();
            renderizarPanel();
        }

        function obtenerEstadoInicial(avion, targetTime, ahora) {
            if (targetTime <= ahora) return "DECOLAJE";
            if (avion.isFire) return "EMERGENCIA";
            if (avion.isMil) return "PATRULLANDO";
            if (avion.isMilBomber) return "ALERTA MAX";
            return "PROGRAMADO"; // Estado limpio inicial para mantener el orden visual
        }

        function ordenarCartelera() {
            flota.sort((a, b) => a.targetTime - b.targetTime);
        }

        function renderizarPanel() {
            const tbody = document.getElementById('board-body');
            if(!tbody) return;
            tbody.innerHTML = '';

            flota.forEach((avion) => {
                const tr = document.createElement('tr');
                
                let claseEstado = "status-standby";
                if (avion.statusText === "EMERGENCIA" || avion.statusText === "ALERTA MAX") claseEstado = "status-alert";
                else if (avion.statusText === "EN VUELO" || avion.statusText === "PATRULLANDO" || avion.statusText === "EN PANTALLA") claseEstado = "status-boarding";
                else if (avion.statusText === "DECOLAJE" || avion.statusText === "DESCARGANDO") claseEstado = "status-departed";

                const liveryTD = avion.isDHL 
                    ? `<td><span class="${avion.class}">${avion.livery}</span></td>` 
                    : `<td class="${avion.class}">${avion.livery}</td>`;

                tr.innerHTML = `
                    <td class="col-time">${formatHHMM(avion.targetTime)}</td>
                    <td class="col-ac">${avion.ac}</td>
                    ${liveryTD}
                    <td class="col-route">${avion.orig} ➔ ${avion.dest}</td>
                    <td class="col-mission">${avion.mission}</td>
                    <td class="col-status"><span class="${claseEstado}">${avion.statusText}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Lógica de despegue y rotación exacta cada 5 minutos
        function chequearHorariosVuelos() {
            const ahora = new Date();
            let huboCambios = false;

            flota.forEach((avion) => {
                if (ahora >= avion.targetTime && !avion.enProcesoDespegue) {
                    avion.statusText = "DECOLAJE";
                    avion.enProcesoDespegue = true;
                    huboCambios = true;
                    
                    setTimeout(() => {
                        // 1. Invertir aeropuertos de origen y destino
                        const viejoOrig = avion.orig;
                        avion.orig = avion.dest;
                        avion.dest = viejoOrig;

                        // 2. Reprogramar sumando exactamente 50 minutos (10 aviones x 5 minutos)
                        // Así se sitúa de forma matemática exactamente al final de la cola manteniendo la cadena
                        const nuevaHora = new Date(avion.targetTime.getTime());
                        nuevaHora.setMinutes(nuevaHora.getMinutes() + 50);
                        avion.targetTime = nuevaHora;

                        // 3. Devolver su estado correspondiente para la ruta de regreso
                        if (avion.isFire) avion.statusText = "EMERGENCIA";
                        else if (avion.isMil) avion.statusText = "PATRULLANDO";
                        else if (avion.isMilBomber) avion.statusText = "ALERTA MAX";
                        else if (avion.isDHL) avion.statusText = "DESCARGANDO";
                        else avion.statusText = estadosNormales[Math.floor(Math.random() * estadosNormales.length)];

                        avion.enProcesoDespegue = false;

                        // 4. Reordenar cartelera para enviarlo abajo del todo y actualizar pantalla
                        ordenarCartelera();
                        renderizarPanel();
                    }, 6000); // 6 segundos en "DECOLAJE" antes de pasar al fondo
                }
            });

            if (huboCambios) {
                renderizarPanel();
            }
        }

        function updateClock() {
            const now = new Date();
            const clockEl = document.getElementById('live-clock');
            if(clockEl) clockEl.innerText = `CLOCK TIME: ${now.toLocaleTimeString()}`;
            
            chequearHorariosVuelos();
        }

        function iniciarScrollAutomatico() {
            const container = document.getElementById('scroll-container');
            let scrollSpeed = 0.8;
            
            function step() {
                if (!container) return;
                container.scrollTop += scrollSpeed;
                if (container.scrollTop + container.clientHeight >= container.scrollHeight - 2) {
                    setTimeout(() => { container.scrollTop = 0; }, 2500);
                }
                requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        // Inicialización global
        setInterval(updateClock, 1000);
        updateClock();
        inicializarFlota();
        iniciarScrollAutomatico();
    </script>

</body>
</html>
