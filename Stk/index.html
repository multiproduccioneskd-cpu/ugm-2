<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #002060;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #001030;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffc000;
        }
        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #current-date {
            font-size: 1.8rem;
            color: #ffc000;
            font-weight: bold;
        }
        main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 80vh;
        }
        .event-card {
            background: linear-gradient(135deg, #002a80 0%, #001848 100%);
            border-left: 10px solid #ffc000;
            border-radius: 8px;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease-out forwards;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .event-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
        }
        .event-room {
            font-size: 1.5rem;
            color: #ffc000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .event-time {
            font-size: 2.8rem;
            font-weight: 800;
            color: #ffffff;
            background-color: #001030;
            padding: 10px 25px;
            border-radius: 6px;
            border: 2px solid #ffc000;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .event-day-label {
            font-size: 1rem;
            color: #ffc000;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .no-events {
            font-size: 2.5rem;
            text-align: center;
            color: #a0b0d0;
            margin-top: 10vh;
        }
    </style>
</head>
<body>

    <header>
        <h1>Eventos de la Semana</h1>
        <div id="current-date">Cargando fecha...</div>
    </header>

    <main>
        <div id="events-container" class="container">
            <div class="no-events">Buscando programaciones en SharePoint...</div>
        </div>
    </main>

    <script>
        // Configurar Zona Horaria de Chile para la fecha del Header
        function updateHeaderDate() {
            const ahora = new Date();
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Santiago' };
            let fechaTexto = ahora.toLocaleDateString('es-CL', opciones);
            fechaTexto = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
            document.getElementById('current-date').innerText = fechaTexto;
        }
        updateHeaderDate();

        async function cargarCartelera() {
            const container = document.getElementById('events-container');
            
            try {
                // Tu endpoint de Vercel
                const response = await fetch('https://ugm-2.vercel.app/api/cartelera');
                if (!response.ok) throw new Error('Error al capturar datos del backend');
                
                const eventos = await response.json();
                
                if (!eventos || eventos.length === 0) {
                    container.innerHTML = '<div class="no-events">No hay eventos registrados en SharePoint</div>';
                    return;
                }

                // Obtener límites de la semana actual (Lunes a Sábado) en base a hora de Chile
                const hoy = new Date();
                
                // Forzar fecha actual ajustada a Chile para el cálculo de la semana
                const hoyChileString = hoy.toLocaleString("en-US", {timeZone: "America/Santiago"});
                const hoyChile = new Date(hoyChileString);
                
                const diaSemana = hoyChile.getDay(); // 0: Domingo, 1: Lunes, etc.
                
                // Calcular Lunes de esta semana (00:00:00)
                const lunesSemana = new Date(hoyChile);
                const distanciaAlLunes = diaSemana === 0 ? -6 : 1 - diaSemana;
                lunesSemana.setDate(hoyChile.getDate() + distanciaAlLunes);
                lunesSemana.setHours(0, 0, 0, 0);

                // Calcular Sábado de esta semana (23:59:59)
                const sabadoSemana = new Date(lunesSemana);
                sabadoSemana.setDate(lunesSemana.getDate() + 5);
                sabadoSemana.setHours(23, 59, 59, 999);

                // Filtrar eventos que caigan dentro de esta semana (Lunes a Sábado)
                const eventosSemana = eventos.filter(ev => {
                    if (!ev.fecha) return false;
                    const fechaEv = new Date(ev.fecha);
                    return fechaEv >= lunesSemana && fechaEv <= sabadoSemana;
                });

                if (eventosSemana.length === 0) {
                    container.innerHTML = '<div class="no-events">No hay más eventos programados para esta semana</div>';
                    return;
                }

                // Ordenar cronológicamente por fecha y hora
                eventosSemana.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

                // Limpiar contenedor y renderizar tarjetas
                container.innerHTML = '';
                eventosSemana.forEach(ev => {
                    const fechaEv = new Date(ev.fecha);
                    
                    // Formatear hora (HH:MM)
                    const horaMinutos = fechaEv.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
                    
                    // Obtener nombre del día (Lun, Mar, Mié...)
                    const diaNombre = fechaEv.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
                    const diaNumero = fechaEv.getDate();
                    const etiquetaDia = `${diaNombre} ${diaNumero}`;

                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-info">
                            <div class="event-title">${ev.title}</div>
                            <div class="event-room">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                ${ev.sala}
                            </div>
                        </div>
                        <div class="event-time">
                            <div class="event-day-label">${etiquetaDia}</div>
                            <div>${horaMinutos}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-events">⚠️ Error de conexión con la cartelera</div>';
            }
        }

        // Carga inicial y refresco automático cada 30 segundos para la tele
        cargarCartelera();
        setInterval(cargarCartelera, 30000);
        setInterval(updateHeaderDate, 60000);
    </script>
</body>
</html>
