<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b192f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #002060;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #0056b3;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .logo-u {
            height: 65px;
            width: auto;
        }
        header h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        #right-header {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        #current-date {
            font-size: 1.6rem;
            color: #ffc000;
            font-weight: bold;
            text-transform: capitalize;
        }
        #current-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
        }
        main {
            flex: 1;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        #scroll-wrapper {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.3s linear;
        }
        .event-card {
            background-color: #172a45;
            border-left: 12px solid #0056b3;
            border-radius: 12px;
            padding: 30px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .event-title {
            font-size: 2.6rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
        }
        .event-room {
            font-size: 1.8rem;
            color: #000000;
            font-weight: bold;
            background-color: #ffa500;
            padding: 8px 24px;
            border-radius: 8px;
            align-self: flex-start;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
