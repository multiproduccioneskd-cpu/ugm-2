<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b192f; color: #ffffff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        header { background-color: #002060; padding: 20px 0px; display: flex; align-items: center; border-bottom: 5px solid #0056b3; width: 100%; height: 110px; position: relative; }
        header h1 { position: absolute; left: 40px; top: 50%; transform: translateY(-50%); font-size: 2.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; white-space: nowrap; z-index: 2; }
        .logo-centro-wrapper { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; z-index: 1; }
        .logo-centro { height: 65px; width: auto; }
        #right-header { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: flex-end; gap: 2px; z-index: 2; }
        #current-date { font-size: 1.6rem; color: #ffc000; font-weight: bold; text-transform: capitalize; }
        #current-time { font-size: 2.5rem; font-weight: bold; color: #ffffff; line-height: 1; }
        main { flex: 1; padding: 30px; position: relative; overflow: hidden; }
        #scroll-wrapper { height: 100%; overflow-y: hidden; position: relative; }
        .container { display: flex; flex-direction: column; gap: 20px; position: absolute; top: 0; left: 0; width: 100%; opacity: 0; transition: transform 0.3s linear, opacity 0.6s ease-in-out; }
        .container.fade-in { opacity: 1; }
        .event-card { background-color: #172a45; border-left: 12px solid #0056b3; border-radius: 12px; padding: 35px 45px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .event-info { display: flex; flex-direction: column; gap: 12px; flex: 1; }
        .event-title { font-size: 2.8rem; font-weight: bold; color: #ffffff; line-height: 1.2; }
        .event-room { font-size: 1.8rem; color: #000000; font-weight: bold; background-color: #ffa500; padding: 6px 20px; border-radius: 8px; text-transform: uppercase; box-shadow: 0 4px 8px rgba(0,0,0,0.2); width: fit-content; }
        .event-time { font-size: 3.5rem; font-weight: 800; color: #38b6ff; background-color: #0b192f; padding: 15px 35px; border-radius: 10px; border: 3px solid #0056b3; white-space: nowrap; text-align: center; display: flex; flex-direction: column; justify-content: center; min-width: 220px; }
        .event-day-label { font-size: 1.3rem; color: #8892b0; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
        .no-events { font-size: 2.8rem; text-align: center; color: #8892b0; margin-top: 15vh; width: 100%; }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">EVENTOS DE HOY</h1>
        <div class="logo-centro-wrapper">
            <img id="logo-medio" src="logo-blanco-celeste.png" alt="Logo Central" class="logo-centro">
        </div>
        <div id="right-header">
            <div id="current-date">Cargando fecha...</div>
            <div id="current-time">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="scroll-wrapper">
            <div id="events-container" class="container">
                <div class="no-events">Cargando cartelera universitaria...</div>
            </div>
        </div>
    </main>

    <script>
        let scrollInterval = null;
        let rotationTimeout = null;
        let modoVistaSemanas = false; 

        function updateClock() {
            const ahora = new Date();
            document.getElementById('current-time').innerText = ahora.toLocaleTimeString('es-CL', { hour12: false });
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Santiago' };
            let fechaTexto = ahora.toLocaleDateString('es-CL', opciones);
            document.getElementById('current-date').innerText = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function iniciarManejoPantalla() {
            if (scrollInterval) clearInterval(scrollInterval);
            if (rotationTimeout) clearTimeout(rotationTimeout);
            
            const wrapper = document.getElementById('scroll-wrapper');
            const container = document.getElementById('events-container');
            container.style.transform = `translateY(0px)`;

            if (container.clientHeight <= wrapper.clientHeight) {
                rotationTimeout = setTimeout(() => { siguientePantalla(); }, 10000);
            } else {
                let currentTop = 0;
                scrollInterval = setInterval(() => {
                    if (container.clientHeight > wrapper.clientHeight) {
                        currentTop -= 1;
                        if (Math.abs(currentTop) >= (container.clientHeight - wrapper.clientHeight + 60)) {
                            clearInterval(scrollInterval);
                            rotationTimeout = setTimeout(() => { siguientePantalla(); }, 3000);
                        } else {
                            container.style.transform = `translateY(${currentTop}px)`;
                        }
                    }
                }, 40);
            }
        }

        function siguientePantalla() {
            const container = document.getElementById('events-container');
            container.classList.remove('fade-in'); 
            setTimeout(() => {
                modoVistaSemanas = !modoVistaSemanas; 
                cargarCartelera();
            }, 600);
        }

        async function cargarCartelera() {
            const container = document.getElementById('events-container');
            const tituloSeccion = document.getElementById('main-title');
            
            // Definimos el Query String según la pantalla que toque rotar
            const parametroVista = modoVistaSemanas ? 'semana' : 'hoy';
            tituloSeccion.innerText = modoVistaSemanas ? "PRÓXIMOS EVENTOS" : "EVENTOS DE HOY";

            try {
                const response = await fetch(`https://ugm-2.vercel.app/api/cartelera?vista=${parametroVista}&nocache=${Date.now()}`);
                if (!response.ok) throw new Error('Error API');
                
                const eventos = await response.json();
                container.innerHTML = '';
                
                if (!eventos || eventos.length === 0 || eventos.error) {
                    container.innerHTML = '<div class="no-events">No hay más eventos programados</div>';
                    container.classList.add('fade-in');
                    rotationTimeout = setTimeout(siguientePantalla, 8000);
                    return;
                }

                eventos.forEach(ev => {
                    let etiquetaDia = "Hoy";
                    
                    if (!ev.esHoy && ev.fechaStr) {
                        try {
                            const [aaaa, mes, dd] = ev.fechaStr.split('-');
                            const d = new Date(parseInt(aaaa,10), parseInt(mes,10) - 1, parseInt(dd,10), 12, 0, 0);
                            const nombreDia = d.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
                            const numDia = d.getDate();
                            etiquetaDia = `${nombreDia.charAt(0).toUpperCase() + nombreDia.slice(1)} ${numDia}`;
                        } catch (e) { etiquetaDia = "Próximo"; }
                    }

                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-info">
                            <div class="event-title">${ev.title}</div>
                            <div class="event-room">${ev.sala}</div>
                        </div>
                        <div class="event-time">
                            <div class="event-day-label">${etiquetaDia}</div>
                            <div>${ev.hora}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                container.classList.add('fade-in');
                setTimeout(iniciarManejoPantalla, 400);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-events">⚠️ Error de conexión con el servidor backend</div>';
                container.classList.add('fade-in');
                rotationTimeout = setTimeout(siguientePantalla, 10000);
            }
        }

        window.onload = () => { cargarCartelera(); };
    </script>
</body>
</html>
