<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera Digital UGM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #020617; color: #f8fafc; padding: 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3b82f6; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-size: 3rem; text-transform: uppercase; color: #fff; }
        #reloj { font-size: 3rem; font-weight: bold; color: #94a3b8; }
        #pantalla { flex-grow: 1; overflow-y: auto; padding-right: 10px; scroll-behavior: smooth; }
        #pantalla::-webkit-scrollbar { display: none; }
        .evento-card { background: #1e293b; padding: 25px; margin-bottom: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .hoy-card { border-left: 10px solid #3b82f6; }
        .semana-card { border-left: 10px solid #f59e0b; }
        @keyframes deslizarEntrada { 0% { opacity: 0; transform: translateX(-30px); } 100% { opacity: 1; transform: translateX(0); } }
        .info-principal { font-size: 2.5rem; font-weight: bold; flex-grow: 1; }
        .badge-info { display: flex; flex-direction: column; align-items: flex-start; margin-right: 40px; min-width: 140px; }
        .fecha-tag { color: #64748b; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .hora-tag { color: #10b981; font-size: 2.2rem; font-weight: bold; }
        .sala-tag { background: #f59e0b; color: #000000; padding: 8px 20px; border-radius: 8px; font-weight: 900; font-size: 1.8rem; min-width: 150px; text-align: center; }
        footer { margin-top: auto; text-align: center; padding-top: 15px; }
        .logo-ugm { max-width: 260px; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); }
        .vacio { text-align: center; font-size: 2rem; color: #475569; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1 id="titulo-cartelera">Cargando Cartelera...</h1>
        <div id="reloj">00:00:00</div>
    </header>

    <div id="pantalla">
        </div>

    <footer>
        <img class="logo-ugm" src="logo-blanco-celeste.png" alt="Logo UGM">
    </footer>

    <script>
        // Reloj integrado
        function moverReloj() {
            const momento = new Date();
            document.getElementById('reloj').textContent = momento.toLocaleTimeString('es-CL', { hour12: false });
        }
        setInterval(moverReloj, 1000);
        moverReloj();

        let vistaActual = "HOY";

        async function renderizarCartelera() {
            try {
                const ahora = new Date();
                const pantalla = document.getElementById('pantalla');
                const titulo = document.getElementById('titulo-cartelera');

                // LÍNEA 76 CORREGIDA: Apunta al Netlify vivo desde afuera
                const respuesta = await fetch('https://caleugm.netlify.app/.netlify/functions/cartelera?t=' + new Date().getTime());
                const items = await respuesta.json();

                let eventosFiltrados = [];
                const opcionesChile = { timeZone: 'America/Santiago', year: 'numeric', month: 'numeric', day: 'numeric' };
                const hoyChileString = ahora.toLocaleDateString('es-CL', opcionesChile);

                items.forEach(item => {
                    const fields = item.fields || {};
                    if (fields.EventDate) {
                        const fechaEvento = new Date(fields.EventDate);
                        
                        // LÍNEA 90 CORREGIDA: Parche de la sala UGM
                        const salaNombre = fields["U_x002e_G_x002e_M_x0020_Sala"] || fields.Location || "Por definir";

                        const ev = {
                            asunto: fields.Title || 'Evento sin título',
                            sala: salaNombre,
                            hora_inicio: fechaEvento
                        };

                        const evChileString = fechaEvento.toLocaleDateString('es-CL', opcionesChile);

                        if (vistaActual === "HOY") {
                            if (evChileString === hoyChileString) {
                                eventosFiltrados.push(ev);
                            }
                        }
                    }
                });

                // Cambiar el título superior según el estado
                titulo.textContent = vistaActual === "HOY" ? "Eventos de Hoy" : "Eventos de la Semana";

                if (eventosFiltrados.length === 0) {
                    pantalla.innerHTML = `<div class="vacio">No hay eventos programados para hoy</div>`;
                    return;
                }

                pantalla.innerHTML = "";
                eventosFiltrados.forEach(ev => {
                    const horaTexto = ev.hora_inicio.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
                    const fechaTexto = ev.hora_inicio.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric' });

                    const card = document.createElement('div');
                    card.className = `evento-card ${vistaActual === "HOY" ? 'hoy-card' : 'semana-card'}`;
                    
                    card.innerHTML = `
                        <div class="badge-info">
                            <span class="fecha-tag">${fechaTexto}</span>
                            <span class="hora-tag">${horaTexto}</span>
                        </div>
                        <div class="info-principal">${ev.asunto}</div>
                        <div class="sala-tag">${ev.sala}</div>
                    `;
                    pantalla.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                document.getElementById('pantalla').innerHTML = `<div class="vacio" style="color: #ef4444;">⚠️ Error al sincronizar con SharePoint</div>`;
            }
        }

        // Sistema de rotación y carga
        setInterval(renderizarCartelera, 30000);
        renderizarCartelera();
    </script>
</body>
</html>
