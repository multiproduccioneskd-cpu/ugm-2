<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b192f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #002060;
            padding: 20px 0px; 
            display: flex;
            align-items: center;
            border-bottom: 5px solid #0056b3;
            width: 100%;
            height: 110px; 
            position: relative;
        }
        header h1 {
            position: absolute;
            left: 40px; 
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
            white-space: nowrap;
            z-index: 2;
        }
        .logo-centro-wrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1; 
        }
        .logo-centro {
            height: 65px;
            width: auto;
        }
        #right-header {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            z-index: 2;
        }
        #current-date {
            font-size: 1.6rem;
            color: #ffc000;
            font-weight: bold;
            text-transform: capitalize;
        }
        #current-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1;
        }
        main {
            flex: 1;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        #scroll-wrapper {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            opacity: 0;
            transition: transform 0.3s linear, opacity 0.6s ease-in-out;
        }
        .container.fade-in {
            opacity: 1;
        }
        .event-card {
            background-color: #172a45;
            border-left: 12px solid #0056b3;
            border-radius: 12px;
            padding: 30px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .event-title {
            font-size: 2.6rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
        }
        .event-badges {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .event-room {
            font-size: 1.6rem;
            color: #000000;
            font-weight: bold;
            background-color: #ffa500; 
            padding: 6px 20px;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .event-destinatario {
            font-size: 1.6rem;
            color: #ffffff;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 8px;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .event-time {
            font-size: 3.2rem;
            font-weight: 800;
            color: #38b6ff;
            background-color: #0b192f;
            padding: 15px 35px;
            border-radius: 10px;
            border: 3px solid #0056b3;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 210px;
        }
        .event-day-label {
            font-size: 1.2rem;
            color: #8892b0;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .badge-en-curso {
            color: #ff4a4a !important; 
            animation: pulse 2s infinite; 
        }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .no-events {
            font-size: 2.8rem;
            text-align: center;
            color: #8892b0;
            margin-top: 15vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">EVENTOS DE HOY</h1>
        
        <div class="logo-centro-wrapper">
            <img id="logo-medio" src="logo-blanco-celeste.png" alt="Logo Central" class="logo-centro">
        </div>

        <div id="right-header">
            <div id="current-date">Cargando fecha...</div>
            <div id="current-time">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="scroll-wrapper">
            <div id="events-container" class="container">
                <div class="no-events">Buscando programaciones en SharePoint...</div>
            </div>
        </div>
    </main>

    <script>
        let scrollInterval = null;
        let rotationTimeout = null;
        let modoVistaSemanas = false; 

        function updateClock() {
            const ahora = new Date();
            document.getElementById('current-time').innerText = ahora.toLocaleTimeString('es-CL', { hour12: false });
            
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Santiago' };
            let fechaTexto = ahora.toLocaleDateString('es-CL', opciones);
            document.getElementById('current-date').innerText = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 🧠 ANALIZADOR INTELIGENTE DE PALABRAS CLAVE DIRECTO EN EL TÍTULO
        function analizarDestinatario(titulo, rawDestino) {
            let texto = "";
            if (rawDestino) {
                if (typeof rawDestino === 'object') texto = rawDestino.Value || rawDestino.value || "";
                else texto = String(rawDestino);
            }
            
            // Si la columna no trae nada en el JSON de la API, leemos las palabras clave en el título
            if (!texto) {
                const tObj = String(titulo).toLowerCase();
                if (tObj.includes('taller') || tObj.includes('integración') || tObj.includes('reunión') || tObj.includes('tricel')) {
                    return { texto: 'ADMINISTRATIVOS', color: '#6f42c1' }; // Morado
                }
                if (tObj.includes('escuela') || tObj.includes('charla') || tObj.includes('sesión')) {
                    return { texto: 'ESCUELAS', color: '#198754' }; // Verde
                }
                if (tObj.includes('cine') || tObj.includes('conversatorio') || tObj.includes('dev talks') || tObj.includes('ugm')) {
                    return { texto: 'COMUNIDAD UGM', color: '#00a896' }; // Turquesa
                }
                return { texto: 'COMUNIDAD UGM', color: '#00a896' }; // Fallback estético
            }

            const t = texto.toLowerCase().trim();
            if (t.includes('comunidad')) return { texto: 'COMUNIDAD UGM', color: '#00a896' };
            if (t.includes('administrativo')) return { texto: 'ADMINISTRATIVOS', color: '#6f42c1' };
            if (t.includes('escuela')) return { texto: 'ESCUELAS', color: '#198754' };
            return { texto: texto.toUpperCase(), color: '#00a896' };
        }

        function iniciarManejoPantalla() {
            if (scrollInterval) clearInterval(scrollInterval);
            if (rotationTimeout) clearTimeout(rotationTimeout);
            
            const wrapper = document.getElementById('scroll-wrapper');
            const container = document.getElementById('events-container');
            
            container.style.transform = `translateY(0px)`;
            const wrapperHeight = wrapper.clientHeight;
            const containerHeight = container.clientHeight;

            if (containerHeight <= wrapperHeight) {
                rotationTimeout = setTimeout(() => {
                    siguientePantalla();
                }, 10000);
            } else {
                let currentTop = 0;
                scrollInterval = setInterval(() => {
                    if (container.clientHeight > wrapper.clientHeight) {
                        currentTop -= 1;
                        if (Math.abs(currentTop) >= (container.clientHeight - wrapper.clientHeight + 60)) {
                            clearInterval(scrollInterval);
                            rotationTimeout = setTimeout(() => {
                                siguientePantalla();
                            }, 3000);
                        } else {
                            container.style.transform = `translateY(${currentTop}px)`;
                        }
                    }
                }, 40);
            }
        }

        function siguientePantalla() {
            const container = document.getElementById('events-container');
            container.classList.remove('fade-in'); 
            
            setTimeout(() => {
                modoVistaSemanas = !modoVistaSemanas; 
                cargarCartelera();
            }, 600);
        }

        async function cargarCartelera() {
            const container = document.getElementById('events-container');
            const tituloSeccion = document.getElementById('main-title');
            
            try {
                const response = await fetch(`https://ugm-2.vercel.app/api/cartelera?nocache=${Date.now()}`);
                if (!response.ok) throw new Error('Error API');
                
                const eventosRaw = await response.json();
                container.innerHTML = '';
                
                if (!eventosRaw || eventosRaw.length === 0 || eventosRaw.error) {
                    container.innerHTML = '<div class="no-events">No hay eventos registrados en SharePoint</div>';
                    container.classList.add('fade-in');
                    rotationTimeout = setTimeout(siguientePantalla, 10000);
                    return;
                }

                const ahoraChile = new Date(new Date().toLocaleString("en-US", {timeZone: "America/Santiago"}));
                const hoyChileString = ahoraChile.toLocaleDateString('sv-SE'); 

                const listaProcesada = [];

                eventosRaw.forEach(ev => {
                    if (ev.casillaTiempo && typeof ev.casillaTiempo === 'string') {
                        const dateObjeto = new Date(ev.casillaTiempo);
                        
                        if (!isNaN(dateObjeto.getTime())) {
                            const esTodoElDia = ev.casillaTiempo.includes("T00:00:00") || ev.casillaTiempo.includes("T02:00:00");
                            
                            let fechaTexto = dateObjeto.toLocaleDateString('sv-SE', { timeZone: 'America/Santiago' });
                            let horaTexto = dateObjeto.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'America/Santiago' });
                            
                            if (esTodoElDia) {
                                fechaTexto = ev.casillaTiempo.split('T')[0];
                                horaTexto = "Todo el día";
                            }

                            const esHoy = (fechaTexto === hoyChileString);
                            let etiquetaEstado = "Hoy";

                            if (esHoy && !esTodoElDia) {
                                const horaEventoObj = new Date(dateObjeto.toLocaleString("en-US", {timeZone: "America/Santiago"}));
                                const diferenciaMinutos = (ahoraChile - horaEventoObj) / 60000;

                                // 🚨 Filtro automático: Elimina de pantalla si lleva más de 30 minutos de retraso/inicio
                                if (diferenciaMinutos > 30) {
                                    return; 
                                }
                                
                                // Marca como "En curso" dinámico
                                if (diferenciaMinutos >= 0 && diferenciaMinutos <= 30) {
                                    etiquetaEstado = "En curso";
                                }
                            }

                            listaProcesada.push({
                                title: ev.title || "Evento sin título",
                                sala: ev.sala || "Por definir",
                                rawDestino: ev.Destinatario || ev.destinatario || null, 
                                hora: horaTexto,
                                fechaStr: fechaTexto,
                                esHoy: esHoy,
                                etiquetaEstado: etiquetaEstado
                            });
                        }
                    }
                });

                let muestraFinal = [];

                if (modoVistaSemanas) {
                    tituloSeccion.innerText = "PRÓXIMOS EVENTOS";
                    const fechaActual = new Date();
                    const diaSemana = fechaActual.getDay(); 
                    let diasHastaFinDeSemana = 7 - diaSemana;
                    if (diaSemana === 0) diasHastaFinDeSemana = 0; 
                    if (diaSemana === 5 || diaSemana === 6 || diaSemana === 0) diasHastaFinDeSemana += 7;

                    const fechaLimiteObj = new Date();
                    fechaLimiteObj.setDate(fechaActual.getDate() + diasHastaFinDeSemana);
                    const limiteString = fechaLimiteObj.toLocaleDateString('sv-SE', { timeZone: 'America/Santiago' });

                    muestraFinal = listaProcesada.filter(ev => !ev.esHoy && ev.fechaStr > hoyChileString && ev.fechaStr <= limiteString);
                } else {
                    tituloSeccion.innerText = "EVENTOS DE HOY";
                    muestraFinal = listaProcesada.filter(ev => ev.esHoy);
                }

                if (muestraFinal.length === 0 && !modoVistaSemanas) {
                    tituloSeccion.innerText = "PRÓXIMOS EVENTOS";
                    const fechaActual = new Date();
                    const diaSemana = fechaActual.getDay();
                    let diasHastaFinDeSemana = 7 - diaSemana;
                    if (diaSemana === 0) diasHastaFinDeSemana = 0;
                    if (diaSemana === 5 || diaSemana === 6 || diaSemana === 0) diasHastaFinDeSemana += 7;

                    const fechaLimiteObj = new Date();
                    fechaLimiteObj.setDate(fechaActual.getDate() + diasHastaFinDeSemana);
                    const limiteString = fechaLimiteObj.toLocaleDateString('sv-SE', { timeZone: 'America/Santiago' });

                    muestraFinal = listaProcesada.filter(ev => !ev.esHoy && ev.fechaStr > hoyChileString && ev.fechaStr <= limiteString);
                }

                if (muestraFinal.length === 0) {
                    container.innerHTML = '<div class="no-events">No hay más eventos programados</div>';
                    container.classList.add('fade-in');
                    modoVistaSemanas = !modoVistaSemanas;
                    rotationTimeout = setTimeout(siguientePantalla, 8000);
                    return;
                }

                muestraFinal.sort((a, b) => `${a.fechaStr}T${a.hora}`.localeCompare(`${b.fechaStr}T${b.hora}`));

                container.innerHTML = '';
                
                muestraFinal.forEach(ev => {
                    let etiquetaDia = ev.etiquetaEstado;
                    let claseExtra = "";

                    if (etiquetaDia === "En curso") {
                        claseExtra = "badge-en-curso";
                    }
                    
                    if (!ev.esHoy && ev.fechaStr !== "9999-12-31") {
                        try {
                            const [aaaa, mes, dd] = ev.fechaStr.split('-');
                            const d = new Date(parseInt(aaaa,10), parseInt(mes,10) - 1, parseInt(dd,10), 12, 0, 0);
                            const nombreDia = d.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
                            const numDia = d.getDate();
                            etiquetaDia = `${nombreDia.charAt(0).toUpperCase() + nombreDia.slice(1)} ${numDia}`;
                        } catch (e) {
                            etiquetaDia = "Próximo";
                        }
                    }

                    // Forzar el análisis dinámico de texto e inyección de colores corporativos
                    const metaPublico = analizarDestinatario(ev.title, ev.rawDestino);

                    const card = document.createElement('div');
                    card.className = 'event-card';
                    
                    card.innerHTML = `
                        <div class="event-info">
                            <div class="event-title">${ev.title}</div>
                            <div class="event-badges">
                                <div class="event-room">${ev.sala}</div>
                                <div class="event-destinatario" style="background-color: ${metaPublico.color};">${metaPublico.texto}</div>
                            </div>
                        </div>
                        <div class="event-time">
                            <div class="event-day-label ${claseExtra}">${etiquetaDia}</div>
                            <div>${ev.hora}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                container.classList.add('fade-in');
                setTimeout(iniciarManejoPantalla, 400);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-events">⚠️ Error de conexión</div>';
                container.classList.add('fade-in');
                rotationTimeout = setTimeout(siguientePantalla, 10000);
            }
        }

        window.onload = () => {
            cargarCartelera();
        };
    </script>
</body>
</html>
