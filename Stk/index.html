<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b192f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #002060;
            padding: 20px 20px; /* Reducido para pegar los elementos a las orillas */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid #0056b3;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo-u {
            height: 65px;
            width: auto;
        }
        header h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 800;
        }
        #right-header {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        #current-date {
            font-size: 1.6rem;
            color: #ffc000;
            font-weight: bold;
            text-transform: capitalize;
        }
        #current-time {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
        }
        main {
            flex: 1;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        #scroll-wrapper {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.3s linear;
        }
        .event-card {
            background-color: #172a45;
            border-left: 12px solid #0056b3;
            border-radius: 12px;
            padding: 30px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }
        .event-title {
            font-size: 2.6rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.2;
        }
        .event-room {
            font-size: 1.8rem;
            color: #000000;
            font-weight: bold;
            background-color: #ffa500;
            padding: 8px 24px;
            border-radius: 8px;
            align-self: flex-start;
            text-transform: uppercase;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .event-time {
            font-size: 3.2rem;
            font-weight: 800;
            color: #38b6ff;
            background-color: #0b192f;
            padding: 15px 35px;
            border-radius: 10px;
            border: 3px solid #0056b3;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 200px;
        }
        .event-day-label {
            font-size: 1.2rem;
            color: #8892b0;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        .no-events {
            font-size: 2.8rem;
            text-align: center;
            color: #8892b0;
            margin-top: 15vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://www.ugm.cl/images/logo.png" alt="UGM" class="logo-u">
            <h1 id="main-title">Cartelera de Eventos</h1>
        </div>
        <div id="right-header">
            <div id="current-date">Cargando fecha...</div>
            <div id="current-time">00:00:00</div>
        </div>
    </header>

    <main>
        <div id="scroll-wrapper">
            <div id="events-container" class="container">
                <div class="no-events">Buscando programaciones en SharePoint...</div>
            </div>
        </div>
    </main>

    <script>
        let scrollInterval = null;
        let modoVistaSemanas = false; // Alternador automático entre vista diaria y semanal

        function updateClock() {
            const ahora = new Date();
            document.getElementById('current-time').innerText = ahora.toLocaleTimeString('es-CL', { hour12: false });
            
            const opciones = { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'America/Santiago' };
            let fechaTexto = ahora.toLocaleDateString('es-CL', opciones);
            document.getElementById('current-date').innerText = fechaTexto.charAt(0).toUpperCase() + fechaTexto.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function iniciarScroll() {
            if (scrollInterval) clearInterval(scrollInterval);
            
            const wrapper = document.getElementById('scroll-wrapper');
            const container = document.getElementById('events-container');
            let currentTop = 0;
            
            // Reiniciar posición visual antes de empezar el scroll
            container.style.transform = `translateY(0px)`;
            
            scrollInterval = setInterval(() => {
                const wrapperHeight = wrapper.clientHeight;
                const containerHeight = container.clientHeight;
                
                if (containerHeight > wrapperHeight) {
                    currentTop -= 1;
                    if (Math.abs(currentTop) >= (containerHeight - wrapperHeight + 60)) {
                        clearInterval(scrollInterval);
                        setTimeout(() => {
                            container.style.transform = `translateY(0px)`;
                            setTimeout(iniciarScroll, 2000);
                        }, 3000);
                    } else {
                        container.style.transform = `translateY(${currentTop}px)`;
                    }
                } else {
                    container.style.transform = `translateY(0px)`;
                }
            }, 40);
        }

        async function cargarCartelera() {
            const container = document.getElementById('events-container');
            const tituloSeccion = document.getElementById('main-title');
            
            try {
                const response = await fetch('https://ugm-2.vercel.app/api/cartelera');
                if (!response.ok) throw new Error('Error API');
                
                const items = await response.json();
                
                if (!items || items.length === 0) {
                    container.innerHTML = '<div class="no-events">No hay eventos registrados en SharePoint</div>';
                    return;
                }

                // Obtener fecha de hoy en formato local de Chile (YYYY-MM-DD)
                const hoyChile = new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Santiago' });

                const datosProcesados = items.map(item => {
                    const f = item.fields || {};
                    
                    let salaDetected = "Por definir";
                    const posiblesColumnasSala = ["Sala", "Ubicacion", "Location", "U_G_M_Sala", "Ubicaci_x00f3_n"];
                    
                    for (let col of posiblesColumnasSala) {
                        if (f[col]) {
                            salaDetected = f[col];
                            break;
                        }
                    }
                    if (salaDetected === "Por definir") {
                        for (let key in f) {
                            if (typeof f[key] === 'string' && (f[key].includes("Auditorio") || f[key].includes("Gimnasio") || f[key].includes("Sala") || f[key].includes("SALÓN"))) {
                                salaDetected = f[key];
                                break;
                            }
                        }
                    }

                    let fechaTexto = "Próximamente";
                    let horaTexto = "00:00";
                    let timestamp = 9999999999999;
                    let esHoy = false;

                    const fechaCruda = f["EventDate"] || f["EventDateTime"] || f["StartDate"] || f["Modified"] || "";
                    
                    if (fechaCruda && typeof fechaCruda === 'string') {
                        const partes = fechaCruda.split('T');
                        if (partes[0] && partes[1]) {
                            fechaTexto = partes[0]; 
                            esHoy = fechaTexto === hoyChile;
                            
                            const subPartesHora = partes[1].split(':');
                            let horaOriginal = parseInt(subPartesHora[0], 10);
                            let minutosOriginales = subPartesHora[1] || "00";

                            if (!isNaN(horaOriginal)) {
                                let horaAjustada = (horaOriginal + 4) % 24;
                                
                                if (parseInt(minutosOriginales, 10) > 0 && parseInt(minutosOriginales, 10) < 10) {
                                    minutosOriginales = "00";
                                }
                                
                                horaTexto = `${String(horaAjustada).padStart(2, '0')}:${minutosOriginales}`;
                                timestamp = new Date(fechaTexto + 'T' + horaTexto + ':00').getTime();
                            }
                        }
                    }

                    return {
                        title: f.Title || f.LinkTitle || "Evento sin título",
                        sala: salaDetected,
                        hora: horaTexto,
                        fechaStr: fechaTexto,
                        esHoy: esHoy,
                        ts: timestamp
                    };
                });

                // Filtrar según el modo alternante de recarga automática
                let eventosFiltrados = [];
                if (modoVistaSemanas) {
                    // MODO SEMANA: Mostrar todo lo que viene ordenado por fecha
                    tituloSeccion.innerText = "Cartelera de Eventos (Semana)";
                    eventosFiltrados = datosProcesados;
                } else {
                    // MODO DÍA: Filtrar solo los que correspondan estrictamente a Hoy
                    tituloSeccion.innerText = "Cartelera de Eventos (Hoy)";
                    eventosFiltrados = datosProcesados.filter(ev => ev.esHoy);
                }

                // Si el modo diario está vacío, saltar de inmediato al modo semanal para no mostrar pantalla en blanco
                if (eventosFiltrados.length === 0 && !modoVistaSemanas) {
                    tituloSeccion.innerText = "Cartelera de Eventos (Próximos)";
                    eventosFiltrados = datosProcesados;
                }

                // Ordenar cronológicamente
                eventosFiltrados.sort((a, b) => a.ts - b.ts);

                container.innerHTML = '';
                
                eventosFiltrados.forEach(ev => {
                    let etiquetaDia = "Hoy";
                    
                    if (!ev.esHoy && ev.fechaStr !== "Próximamente") {
                        try {
                            const d = new Date(ev.fechaStr + 'T12:00:00');
                            const nombreDia = d.toLocaleDateString('es-CL', { weekday: 'short' }).replace('.', '');
                            const numDia = d.getDate();
                            etiquetaDia = `${nombreDia.charAt(0).toUpperCase() + nombreDia.slice(1)} ${numDia}`;
                        } catch (e) {
                            etiquetaDia = "Próximo";
                        }
                    }

                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <div class="event-info">
                            <div class="event-title">${ev.title}</div>
                            <div class="event-room">${ev.sala}</div>
                        </div>
                        <div class="event-time">
                            <div class="event-day-label">${etiquetaDia}</div>
                            <div>${ev.hora}</div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // Alternar el modo para el próximo refresco automático (en 30 segundos)
                modoVistaSemanas = !modoVistaSemanas;

                setTimeout(iniciarScroll, 1000);

            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="no-events">⚠️ Error de comunicación con SharePoint</div>';
            }
        }

        // Carga inicial y refresco cada 30 segundos alternando vistas
        cargarCartelera();
        setInterval(cargarCartelera, 30000);
    </script>
</body>
</html>
