<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera Digital UGM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #020617; color: #f8fafc; padding: 40px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3b82f6; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-size: 3rem; text-transform: uppercase; color: #fff; letter-spacing: -1px; }
        #reloj { font-size: 3rem; font-weight: bold; color: #94a3b8; }
        
        /* Contenedor adaptado para transiciones por bloques y scroll */
        #contenedor-pantalla { flex-grow: 1; overflow: hidden; position: relative; margin-bottom: 20px; }
        
        #pantalla { 
            position: absolute; 
            width: 100%; 
            top: 0; 
            transition: transform 0.6s ease-in-out, opacity 0.5s ease-in-out; 
            opacity: 1;
        }

        /* Clases de control para los efectos de transición suaves */
        .fade-out { opacity: 0 !important; }
        .fade-in { opacity: 1 !important; }
        
        .evento-card { background: #1e293b; padding: 25px; margin-bottom: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .hoy-card { border-left: 10px solid #3b82f6; }
        .semana-card { border-left: 10px solid #f59e0b; }
        
        .info-principal { font-size: 2.3rem; font-weight: bold; flex-grow: 1; padding-right: 20px; line-height: 1.2; }
        .badge-info { display: flex; flex-direction: column; align-items: flex-start; margin-right: 40px; min-width: 160px; }
        .fecha-tag { color: #94a3b8; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .hora-tag { color: #3b82f6; font-size: 2.2rem; font-weight: bold; }
        .semana-card .hora-tag { color: #f59e0b; }
        
        .sala-tag { background: #f59e0b; color: #000000; padding: 8px 20px; border-radius: 8px; font-weight: 900; font-size: 1.8rem; min-width: 180px; text-align: center; }
        
        footer { margin-top: auto; text-align: center; padding-top: 15px; border-top: 2px solid #1e293b; }
        .logo-ugm { max-width: 260px; filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.3)); }
        .vacio { text-align: center; font-size: 2.5rem; color: #475569; margin-top: 100px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1 id="titulo-cartelera">Eventos de Hoy</h1>
        <div id="reloj">00:00:00</div>
    </header>

    <div id="contenedor-pantalla">
        <div id="pantalla">
            </div>
    </div>

    <footer>
        <img class="logo-ugm" src="logo-blanco-celeste.png" alt="Logo UGM">
    </footer>

    <script>
        // Reloj digital continuo al segundo
        function moverReloj() {
            const momento = new Date();
            document.getElementById('reloj').textContent = momento.toLocaleTimeString('es-CL', { hour12: false });
        }
        setInterval(moverReloj, 1000);
        moverReloj();

        let vistaActual = "HOY"; 
        let scrollInterval;
        let datosLocales = []; 

        // 1. Petición principal apuntando con URL de producción absoluta
        async function actualizarDatosSharePoint() {
            try {
                const urlBackend = 'https://ugm-2.vercel.app/api/cartelera';
                const respuesta = await fetch(urlBackend + '?t=' + new Date().getTime());
                if (!respuesta.ok) throw new Error('Error ' + respuesta.status);
                datosLocales = await respuesta.json();
                
                procesarYMostrarVista();
            } catch (error) {
                console.error("Fallo al conectar con la API de Vercel:", error);
                procesarYMostrarVista();
            }
        }

        // 2. Lógica de renderizado bimodal (Separa el día de hoy de los próximos)
        function procesarYMostrarVista() {
            const ahora = new Date();
            const pantalla = document.getElementById('pantalla');
            const titulo = document.getElementById('titulo-cartelera');
            
            let eventosFiltrados = [];
            const opcionesChile = { timeZone: 'America/Santiago', year: 'numeric', month: 'numeric', day: 'numeric' };
            const hoyChileString = ahora.toLocaleDateString('es-CL', opcionesChile);

            titulo.textContent = vistaActual === "HOY" ? "Eventos de Hoy" : "Próximos Eventos";

            if (datosLocales && datosLocales.length > 0) {
                datosLocales.forEach(item => {
                    const fechaEvento = item.fecha ? new Date(item.fecha) : new Date();
                    
                    if (!isNaN(fechaEvento.getTime())) {
                        const evChileString = fechaEvento.toLocaleDateString('es-CL', opcionesChile);

                        const ev = {
                            asunto: item.title,
                            sala: item.sala,
                            hora_inicio: fechaEvento
                        };

                        if (vistaActual === "HOY") {
                            if (evChileString === hoyChileString) {
                                eventosFiltrados.push(ev);
                            }
                        } else {
                            if (evChileString !== hoyChileString) {
                                eventosFiltrados.push(ev);
                            }
                        }
                    }
                });
                eventosFiltrados.sort((a, b) => a.hora_inicio - b.hora_inicio);
            }

            // GATILLAR EL EFECTO FADE OUT (Ocultar suave)
            pantalla.classList.add('fade-out');

            setTimeout(() => {
                pantalla.innerHTML = "";
                pantalla.style.transform = `translateY(0px)`; // Reinicia el scroll al tope

                if (eventosFiltrados.length === 0) {
                    pantalla.innerHTML = vistaActual === "HOY" 
                        ? `<div class="vacio">No hay más eventos programados para hoy</div>`
                        : `<div class="vacio">No hay eventos agendados para los próximos días</div>`;
                    if (scrollInterval) clearInterval(scrollInterval);
                } else {
                    eventosFiltrados.forEach(ev => {
                        const horaTexto = ev.hora_inicio.toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit', hour12: false });
                        const fechaTexto = vistaActual === "HOY" ? "Hoy" : ev.hora_inicio.toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' });

                        const card = document.createElement('div');
                        card.className = `evento-card ${vistaActual === "HOY" ? 'hoy-card' : 'semana-card'}`;
                        
                        card.innerHTML = `
                            <div class="badge-info">
                                <span class="fecha-tag">${fechaTexto}</span>
                                <span class="hora-tag">${horaTexto}</span>
                            </div>
                            <div class="info-principal">${ev.asunto}</div>
                            <div class="sala-tag">${ev.sala}</div>
                        `;
                        pantalla.appendChild(card);
                    });

                    ajustarAutoScrollInterno();
                }

                // GATILLAR EL EFECTO FADE IN (Mostrar suave)
                pantalla.classList.remove('fade-out');
                pantalla.classList.add('fade-in');
            }, 500);
        }

        // 3. Sistema de scroll mecánico automático por bloques de pantalla
        function ajustarAutoScrollInterno() {
            if (scrollInterval) clearInterval(scrollInterval);
            const contenedor = document.getElementById('contenedor-pantalla');
            const pantalla = document.getElementById('pantalla');
            let posicionActual = 0;
            const altoContenedor = contenedor.clientHeight;

            scrollInterval = setInterval(() => {
                const altoContenido = pantalla.scrollHeight;
                if (altoContenido <= altoContenedor) return;
                posicionActual += (altoContenedor - 40);

                if (posicionActual >= altoContenido) {
                    setTimeout(() => {
                        posicionActual = 0;
                        pantalla.style.transform = `translateY(0px)`;
                    }, 2000); // 2 segundos de pausa abajo antes de resetear
                } else {
                    pantalla.style.transform = `translateY(-${posicionActual}px)`;
                }
            }, 8000); // Salta de bloque cada 8 segundos
        }

        // 4. Temporizador bimodal: Alterna la vista cada 15 segundos exactos
        setInterval(() => {
            vistaActual = (vistaActual === "HOY") ? "SEMANA" : "HOY";
            procesarYMostrarVista();
        }, 15000);

        // Ciclo continuo: Actualiza los datos de SharePoint cada 1 minuto
        setInterval(actualizarDatosSharePoint, 60000); 
        actualizarDatosSharePoint();
    </script>
</body>
</html>
</html>
