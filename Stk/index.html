<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartelera de Eventos UGM</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #002060;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background-color: #001030;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #ffc000;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .logo-u {
            height: 60px;
            width: auto;
            object-fit: contain;
        }
        header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #current-date {
            font-size: 1.8rem;
            color: #ffc000;
            font-weight: bold;
        }
        main {
            flex: 1;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        #scroll-wrapper {
            height: 100%;
            overflow-y: hidden;
            position: relative;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: transform 0.5s ease-in-out;
        }
        .event-card {
            background: linear-gradient(135deg, #002a80 0%, #001848 100%);
            border-left: 10px solid #ffc000;
            border-radius: 8px;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .event-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }
        .event-title {
            font-size: 2.4rem;
            font-weight: bold;
            color: #ffffff;
        }
        .event-room {
            font-size: 1.8rem;
            color: #ffc000;
            font-weight: bold;
            background-color: rgba(255, 192, 0, 0.1);
            padding: 5px 15px;
            border-radius: 4px;
            align-self: flex-start;
            text-transform: uppercase;
        }
        .event-time {
            font-size: 3rem;
            font-weight: 800;
            color: #ffffff;
            background-color: #001030;
            padding: 15px 30px;
            border-radius: 6px;
            border: 2px solid #ffc000;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 180px;
        }
        .event-day-label {
            font-size: 1.1rem;
            color: #ffc000;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .no-events {
            font-size: 2.5rem;
            text-align: center;
            color: #a0b0d0;
            margin-top: 15vh;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="https://www.ugm.cl/images/logo.png" alt="Logo UGM" class="logo-u" onerror="this.style.display='none'">
            <h1>Cartelera de Eventos</h1>
        </div>
        <div id="current-date">Cargando fecha...</div>
    </header>

    <main>
        <div id="scroll-wrapper">
            <div id="events-container" class="container">
                <div class="no-events">Buscando programaciones en SharePoint...</div>
            </div>
        </div>
    </main>
